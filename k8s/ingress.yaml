---
# Ingress with TLS termination
# Requires: cert-manager, nginx ingress controller
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pandang-ingress
  namespace: pandang
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "16m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://pandang.com,https://admin.pandang.com"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - pandang.com
        - www.pandang.com
        - admin.pandang.com
        - api.pandang.com
      secretName: pandang-tls
  rules:
    # Main web UI
    - host: pandang.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-ui
                port:
                  number: 3000
    - host: www.pandang.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-ui
                port:
                  number: 3000

    # Admin dashboard
    - host: admin.pandang.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-dashboard
                port:
                  number: 3010

    # API gateway — routes to internal services
    - host: api.pandang.com
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 3001
          - path: /wallet
            pathType: Prefix
            backend:
              service:
                name: wallet
                port:
                  number: 3002
          - path: /games
            pathType: Prefix
            backend:
              service:
                name: game
                port:
                  number: 3009
          - path: /jackpot
            pathType: Prefix
            backend:
              service:
                name: jackpot
                port:
                  number: 3003
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: admin-api
                port:
                  number: 3008
