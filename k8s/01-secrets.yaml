---
# ExternalSecret references — populate from Vault / AWS SSM / Kubernetes Secret
# In production, replace with your secrets management solution.
# Never commit actual secret values to this file.
apiVersion: v1
kind: Secret
metadata:
  name: pandang-secrets
  namespace: pandang
  annotations:
    # When using External Secrets Operator, replace this manifest with
    # an ExternalSecret CRD pointing to your Vault or AWS SSM path.
    # See: https://external-secrets.io/latest/
    external-secrets.io/managed: "true"
type: Opaque
stringData:
  # IMPORTANT: Replace these placeholders with references to your secrets manager.
  # Do NOT hardcode real values here.
  DATABASE_URL: "postgresql://pandang:REPLACE_ME@postgres:5432/pandang_db?schema=public"
  REDIS_URL: "redis://REPLACE_ME@redis:6379"
  JWT_SECRET: "REPLACE_WITH_32_PLUS_CHAR_RANDOM_SECRET"
  JWT_REFRESH_SECRET: "REPLACE_WITH_DIFFERENT_32_PLUS_CHAR_RANDOM_SECRET"
  PAYMONGO_SECRET_KEY: "sk_live_REPLACE_ME"
  PAYMONGO_WEBHOOK_SECRET: "REPLACE_ME"
  STRIPE_SECRET_KEY: "sk_live_REPLACE_ME"
  STRIPE_WEBHOOK_SECRET: "whsec_REPLACE_ME"
  XENDIT_SECRET_KEY: "xnd_production_REPLACE_ME"
  XENDIT_CALLBACK_TOKEN: "REPLACE_ME"
