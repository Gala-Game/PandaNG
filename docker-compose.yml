      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - panda-ng-network

  # ── Apps ────────────────────────────────────────────────────────────────────

  web-ui:
    build:
      context: ./apps/web-ui
      dockerfile: Dockerfile
    container_name: pandang-web-ui
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      PORT: 3000
    depends_on:
