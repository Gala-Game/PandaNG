version: '3.9'

networks:
  panda-ng-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: pandang-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pandang
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pandang_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pandang -d pandang_db']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - panda-ng-network

  redis:
    image: redis:7-alpine
    container_name: pandang-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - panda-ng-network

  # ── Services ────────────────────────────────────────────────────────────────

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: pandang-auth
    restart: unless-stopped
    ports:
      - '3001:3001'
    env_file:
      - .env
    environment:
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - panda-ng-network

  wallet:
    build:
      context: .
      dockerfile: services/wallet/Dockerfile
    container_name: pandang-wallet
    restart: unless-stopped
    ports:
      - '3002:3002'
    env_file:
      - .env
    environment:
      PORT: 3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - panda-ng-network

  jackpot:
    build:
      context: .
      dockerfile: services/jackpot/Dockerfile
    container_name: pandang-jackpot
    restart: unless-stopped
    ports:
      - '3003:3003'
    env_file:
      - .env
    environment:
      PORT: 3003
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - panda-ng-network

  realtime:
    build:
      context: .
      dockerfile: services/realtime/Dockerfile
    container_name: pandang-realtime
    restart: unless-stopped
    ports:
      - '3004:3004'
    env_file:
      - .env
    environment:
      PORT: 3004
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - panda-ng-network

  rewards:
    build:
      context: .
      dockerfile: services/rewards/Dockerfile
    container_name: pandang-rewards
    restart: unless-stopped
    ports:
      - '3005:3005'
    env_file:
      - .env
    environment:
      PORT: 3005
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - panda-ng-network

  notifications:
    build:
      context: .
      dockerfile: services/notifications/Dockerfile
    container_name: pandang-notifications
    restart: unless-stopped
    ports:
      - '3006:3006'
    env_file:
      - .env
    environment:
      PORT: 3006
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - panda-ng-network

  fraud:
    build:
      context: .
      dockerfile: services/fraud/Dockerfile
    container_name: pandang-fraud
    restart: unless-stopped
    ports:
      - '3007:3007'
    env_file:
      - .env
    environment:
      PORT: 3007
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - panda-ng-network

  admin-api:
    build:
      context: .
      dockerfile: services/admin-api/Dockerfile
    container_name: pandang-admin-api
    restart: unless-stopped
    ports:
      - '3008:3008'
    env_file:
      - .env
    environment:
      PORT: 3008
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - panda-ng-network

  game:
    build:
      context: .
      dockerfile: services/game/Dockerfile
    container_name: pandang-game
    restart: unless-stopped
    ports:
      - '3009:3009'
    environment:
      PORT: 3009
      NODE_ENV: development
      DATABASE_URL: postgresql://pandang:password@postgres:5432/pandang_db
      DATABASE_DIRECT_URL: postgresql://pandang:password@postgres:5432/pandang_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      WALLET_SERVICE_URL: http://wallet:3002
      JACKPOT_SERVICE_URL: http://jackpot:3003
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-in-production}
      CORS_ORIGINS: http://localhost:3000,http://localhost:3010
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - panda-ng-network
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3009/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Apps ────────────────────────────────────────────────────────────────────

  web-ui:
    build:
      context: .
      dockerfile: apps/web-ui/Dockerfile
    container_name: pandang-web-ui
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - panda-ng-network



  admin-dashboard:
    build:
      context: .
      dockerfile: apps/admin-dashboard/Dockerfile
    container_name: pandang-admin-dashboard
    restart: unless-stopped
    ports:
      - '3010:3010'
    environment:
      PORT: 3010
      NODE_ENV: production
      NEXT_PUBLIC_ADMIN_API_URL: http://admin-api:3008/api/v1
      NEXT_PUBLIC_GAME_ENGINE_URL: http://game:3009/api/v1
    depends_on:
      - admin-api
    networks:
      - panda-ng-network
