name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  lint-and-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type-check
        run: pnpm run type-check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test --if-present
        env:
          NODE_ENV: test
          DATABASE_URL: 'postgresql://test:test@localhost:5432/test?schema=public'
          JWT_SECRET: 'test-secret-not-for-production'

  build-packages:
    name: Build Packages
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @panda-ng/types run build
          pnpm --filter @panda-ng/config run build
          pnpm --filter @panda-ng/utils run build
          pnpm --filter @panda-ng/game-sdk run build

  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [test, build-packages]
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth
            dockerfile: services/auth/Dockerfile
          - service: wallet
            dockerfile: services/wallet/Dockerfile
          - service: game
            dockerfile: services/game/Dockerfile
          - service: jackpot
            dockerfile: services/jackpot/Dockerfile
          - service: realtime
            dockerfile: services/realtime/Dockerfile
          - service: rewards
            dockerfile: services/rewards/Dockerfile
          - service: notifications
            dockerfile: services/notifications/Dockerfile
          - service: fraud
            dockerfile: services/fraud/Dockerfile
          - service: admin-api
            dockerfile: services/admin-api/Dockerfile
          - service: web-ui
            dockerfile: apps/web-ui/Dockerfile
          - service: admin-dashboard
            dockerfile: apps/admin-dashboard/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: pandang-${{ matrix.service }}:${{ github.sha }}
